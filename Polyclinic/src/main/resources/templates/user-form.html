<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="base :: head('Thông tin người dùng', null)"></head>

    <body>

        <div th:replace="base :: siteHeader(${activePage})"></div>

        <main class="admin-page">
            <div class="container py-4">

                <div class="page-banner mb-4">
                    <h2 class="mb-1 fw-bold">Thông tin người dùng</h2>
                    <p class="mb-0 text-muted">Nhập dữ liệu người dùng</p>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0 fw-bold">Thông tin người dùng</h5>
                    </div>

                    <div class="card-body">
                        <form th:action="@{/admin/users}"
                              method="post"
                              th:object="${user}"
                              enctype="multipart/form-data">

                            <input type="hidden" th:field="*{id}" />

                            <div class="row g-3">

                                <div class="col-md-6">
                                    <label class="form-label">Tên đăng nhập</label>
                                    <input type="text" class="form-control" th:field="*{username}" required />
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Mật khẩu mới</label>
                                    <input type="password"
                                           class="form-control"
                                           name="rawPassword"
                                           placeholder="Để trống nếu không đổi mật khẩu" />
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Họ tên</label>
                                    <input type="text" class="form-control" th:field="*{name}" required />
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Số điện thoại</label>
                                    <input type="text" class="form-control" th:field="*{phone}" required />
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Email <span class="text-danger">*</span></label>
                                    <input type="email" class="form-control" th:field="*{email}" required
                                           placeholder="example@email.com" />
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Vai trò</label>
                                    <select class="form-select" th:field="*{role}" id="roleSelect">
                                        <option value="ROLE_ADMIN">ROLE_ADMIN</option>
                                        <option value="ROLE_DOCTOR">ROLE_DOCTOR</option>
                                        <option value="ROLE_PATIENT">ROLE_PATIENT</option>
                                        <option value="ROLE_PHARMACIST">ROLE_PHARMACIST</option>
                                    </select>
                                </div>

                                <div class="col-md-6" id="specialtyBlock">
                                    <label class="form-label">Chuyên khoa</label>
                                    <select class="form-select" name="specialtyId">
                                        <option value="">-- Chọn chuyên khoa --</option>
                                        <option th:each="s : ${specialties}"
                                                th:value="${s.id}"
                                                th:text="${s.name}"
                                                th:selected="${specialtyId != null and s.id.equals(specialtyId)}">
                                        </option>
                                    </select>
                                </div>
                                
                                <div id="doctorBlock" class="col-12">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Phí khám (VNĐ)</label>
                                            <input type="number" name="consultationFee" class="form-control" min="0"
                                                   th:value="${doctor != null ? doctor.consultationFee : 0}"/>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Giới tính</label>
                                            <select class="form-select" name="gender">
                                                <option value="">-- Chọn --</option>
                                                <option value="MALE"   th:selected="${doctor != null and doctor.gender == 'MALE'}">Nam</option>
                                                <option value="FEMALE" th:selected="${doctor != null and doctor.gender == 'FEMALE'}">Nữ</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Ngày sinh</label>
                                            <input type="date" name="dateOfBirthStr" class="form-control"
                                                   th:value="${doctor != null and doctor.dateOfBirth != null ? #dates.format(doctor.dateOfBirth,'yyyy-MM-dd') : ''}" />
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Địa chỉ</label>
                                            <input type="text" name="address" class="form-control"
                                                   th:value="${doctor != null ? doctor.address : ''}" />
                                        </div>
                                        <div class="col-md-12">
                                            <label class="form-label">Tiểu sử / Kinh nghiệm</label>
                                            <textarea name="bio" class="form-control" rows="3"
                                                      th:text="${doctor != null ? doctor.bio : ''}"></textarea>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label d-block">Khám online</label>
                                            <div class="form-check form-switch">
                                                <input class="form-check-input" type="checkbox" name="availableOnline"
                                                       th:checked="${doctor != null and doctor.availableOnline}" />
                                                <label class="form-check-label">Nhận khám trực tuyến (Google Meet)</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div id="patientBlock" class="col-12">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Giới tính</label>
                                            <select name="gender" class="form-select">
                                                <option value="">-- Chọn --</option>
                                                <option value="MALE"   th:selected="${patient != null and patient.gender == 'MALE'}">Nam</option>
                                                <option value="FEMALE" th:selected="${patient != null and patient.gender == 'FEMALE'}">Nữ</option>
                                                <option value="OTHER"  th:selected="${patient != null and patient.gender == 'OTHER'}">Khác</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Ngày sinh</label>
                                            <input type="date" name="dateOfBirthStr" class="form-control"
                                                   th:value="${patient != null and patient.dateOfBirth != null ? #dates.format(patient.dateOfBirth,'yyyy-MM-dd') : ''}" />
                                        </div>
                                        <div class="col-md-12">
                                            <label class="form-label">Địa chỉ</label>
                                            <input type="text" name="address" class="form-control"
                                                   th:value="${patient != null ? patient.address : ''}" />
                                        </div>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Ảnh đại diện</label>
                                    <input type="file" class="form-control" th:field="*{file}" accept="image/*" />
                                </div>

                                <div class="col-md-6"
                                     th:if="${user.avatar != null and !#strings.isEmpty(user.avatar)}">
                                    <label class="form-label d-block">Ảnh hiện tại</label>
                                    <img th:src="${user.avatar}" alt="avatar" class="img-thumbnail" style="max-width: 150px;">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label d-block">Trạng thái</label>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" th:field="*{isActive}" />
                                        <label class="form-check-label">Hoạt động</label>
                                    </div>
                                </div>

                            </div>

                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Lưu</button>
                                <a th:href="@{/admin/users}" class="btn btn-secondary">Quay lại</a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </main>

        <div th:replace="base :: Footer"></div>
        <div th:replace="base :: commonScripts"></div>
        <script th:src="@{/js/scripts.js}"></script>

    </body>
</html>
