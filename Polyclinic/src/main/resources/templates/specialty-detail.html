<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="base :: head('Chi tiết chuyên khoa', null)"></head>

    <body>

        <div th:replace="base :: siteHeader(${activePage})"></div>

        <main class="admin-page">
            <div class="container py-4">

                <!-- Banner -->
                <div class="page-banner mb-4">
                    <h2 class="mb-1 fw-bold"
                        th:text="'Chuyên khoa: ' + ${specialty.name}">
                        Chi tiết chuyên khoa
                    </h2>

                    <p class="mb-0 text-muted"
                       th:text="${specialty.description}">
                        Mô tả chuyên khoa
                    </p>
                </div>

                <!-- Doctor list -->
                <div class="card border-0 shadow-sm">

                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold">
                            Danh sách bác sĩ thuộc chuyên khoa
                        </h5>
                    </div>

                    <div class="card-body">

                        <div class="table-responsive">

                            <table class="table table-bordered table-hover align-middle mb-0">

                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Họ tên</th>
                                        <th>Username</th>
                                        <th>SĐT</th>
                                        <th>Rating</th>
                                        <th width="260">Chuyển chuyên khoa</th>
                                    </tr>
                                </thead>

                                <tbody>

                                    <tr th:each="d : ${doctors}">

                                        <td th:text="${d.id}"></td>

                                        <td th:text="${d.userId.name}"></td>

                                        <td th:text="${d.userId.username}"></td>

                                        <td th:text="${d.userId.phone}"></td>

                                        <td>
                                            <span th:if="${d.rating != null}"
                                                  th:text="${d.rating}"></span>

                                            <span th:unless="${d.rating != null}"
                                                  class="text-muted">
                                                Chưa có
                                            </span>
                                        </td>

                                        <!-- chuyển khoa -->
                                        <td>

                                            <form th:action="@{/admin/specialties/change-doctor-specialty}"
                                                  method="post"
                                                  class="d-flex gap-2">

                                                <input type="hidden"
                                                       name="doctorId"
                                                       th:value="${d.id}" />

                                                <select class="form-select"
                                                        name="specialtyId">

                                                    <option th:each="s : ${allSpecialties}"
                                                            th:value="${s.id}"
                                                            th:text="${s.name}"
                                                            th:selected="${s.id == specialty.id}">
                                                    </option>

                                                </select>

                                                <button class="btn btn-sm btn-primary">
                                                    Chuyển
                                                </button>

                                            </form>

                                        </td>

                                    </tr>

                                    <tr th:if="${#lists.isEmpty(doctors)}">
                                        <td colspan="6"
                                            class="text-center text-muted">
                                            Chưa có bác sĩ thuộc chuyên khoa này.
                                        </td>
                                    </tr>

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </div>
        </main>

        <div th:replace="base :: Footer"></div>
        <div th:replace="base :: commonScripts"></div>

    </body>
</html>
