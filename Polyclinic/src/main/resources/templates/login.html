<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="base :: head('Đăng nhập', '/css/user.css')"></head>

    <body>

        <div th:replace="base :: siteHeader('login')"></div>

        <main class="login-page">
            <div class="container">
                <div class="row justify-content-center align-items-center min-vh-80">
                    <div class="col-md-6 col-lg-4">
                        <div class="card login-card border-0 shadow-sm">
                            <div class="card-body p-4">
                                <div class="text-center mb-4">
                                    <h3 class="fw-bold mb-1">Đăng nhập hệ thống</h3>
                                    <p class="text-muted mb-0">Trang quản trị phòng khám</p>
                                </div>

                                <div th:if="${param.error}" class="alert alert-danger">
                                    Sai tên đăng nhập hoặc mật khẩu!
                                </div>
                                
                                <div th:if="${param.forbidden}" class="alert alert-warning">
                                    Bạn không có quyền truy cập vào trang này!
                                </div>

                                <div th:if="${param.logout}" class="alert alert-success">
                                    Đăng xuất thành công.
                                </div>

                                <form th:action="@{/login}" method="post">
                                    <div class="mb-3">
                                        <label class="form-label">Tên đăng nhập</label>
                                        <input type="text" name="username" class="form-control input-custom" required>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Mật khẩu</label>
                                        <input type="password" name="password" class="form-control input-custom" required>
                                    </div>

                                    <button type="submit" class="btn btn-login w-100">
                                        Đăng nhập
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div th:replace="base :: Footer"></div>
        <div th:replace="base :: commonScripts"></div>

    </body>
</html>
