<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="base::head('Quản lý lịch hẹn',null)"></head>
    <body>
        <div th:replace="base::siteHeader(${activePage})"></div>
        <main class="admin-page">
            <div class="container py-4">
                <div class="page-banner mb-4">
                    <h2 class="mb-1 fw-bold">Quản lý lịch hẹn</h2>
                    <p class="mb-0 text-muted">Xem và cập nhật trạng thái lịch hẹn</p>
                </div>
                
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <form method="get" th:action="@{/admin/appointments}" class="row g-3">
                            <div class="col-md-3">
                                <input type="text" name="kw" class="form-control"
                                       placeholder="Tên bệnh nhân/ bác sĩ"
                                       th:value="${kw}"/>
                            </div>
                            <div class="col-md-2">
                                <select name="status" class="form-select">
                                    <option value="">---Trạng thái---</option>
                                    <option value="PENDING"   th:selected="${status == 'PENDING'}">Chờ xác nhận</option>
                                    <option value="CONFIRMED" th:selected="${status == 'CONFIRMED'}">Đã xác nhận</option>
                                    <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">Hoàn thành</option>
                                    <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">Đã hủy</option>
                                    <option value="NO_SHOW"   th:selected="${status == 'NO_SHOW'}">Không đến</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <input type="date" name="fromDate" class="form-control" th:value="${fromDate}" />
                            </div>
                            <div class="col-md-2">
                                <input type="date" name="toDate" class="form-control" th:value="${toDate}" />
                            </div>
                            <div class="col-md-3 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Lọc</button>
                                <a th:href="@{/admin/appointments}" class="btn btn-outline-secondary">Xóa lọc</a>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>#</th>
                                        <th>Bệnh nhân</th>
                                        <th>Bác sĩ</th>
                                        <th>Ngày hẹn</th>
                                        <th>Triệu chứng</th>
                                        <th>Trạng thái</th>
                                        <th>Cập nhật</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="a:${appointments}">
                                        <td th:text="${a.id}"></td>
                                        <td th:text="${a.patientId.userId.name}"></td>
                                        <td th:text="${a.doctorId.userId.name}"></td>
                                        <td th:text="${#dates.format(a.scheduledAt, 'HH:mm dd/MM/yyyy')}"></td>
                                        <td th:text="${a.symptoms}"></td>
                                        <td>
                                            <span th:text="${a.status}"
                                                  th:classappend="${a.status == 'PENDING' ? 'badge bg-warning text-dark':
                                                                    a.status == 'CONFIRMED' ? 'badge bg-primary' : 
                                                                    a.status == 'COMPLETED' ? 'badge bg-success' :
                                                                    a.status == 'CANCELLED' ? 'badge bg-danger' :
                                                'badge bg-secondary'}">
                                            </span>
                                        </td>
                                        <td>
                                            <form th:action="@{/admin/appointments/{id}/status(id=${a.id})}"
                                                  method="post" class="d-flex gap-1">
                                                <select name="status" class="form-select form-select-sm" style="width:auto">
                                                    <option value="PENDING"   th:selected="${a.status == 'PENDING'}">Chờ xác nhận</option>
                                                    <option value="CONFIRMED" th:selected="${a.status == 'CONFIRMED'}">Đã xác nhận</option>
                                                    <option value="COMPLETED" th:selected="${a.status == 'COMPLETED'}">Hoàn thành</option>
                                                    <option value="CANCELLED" th:selected="${a.status == 'CANCELLED'}">Đã hủy</option>
                                                    <option value="NO_SHOW"   th:selected="${a.status == 'NO_SHOW'}">Không đến</option>
                                                </select>
                                                <button type="submit" class="btn btn-sm btn-outline-primary">Lưu</button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(appointments)}">
                                        <td colspan="7" class="text-center text-muted py-4">Không có lịch hẹn nào</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="mt-3 d-flex justify-content-center"
                             th:if="${totalPages>1}">
                            <nav>
                                <ul class="pagination mb-0">
                                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}">
                                        <a class="page-link"
                                           th:classappend="${i == currentPage} ? ' active': ''"
                                           th:href="@{/admin/appointments(page=${i}, kw=${kw}, status=${status}, fromDate=${fromDate}, toDate=${toDate})}"
                                           th:text="${i}">
                                        </a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <div th:replace="base :: Footer"></div>
        <div th:replace="base :: commonScripts"></div>
    </body>
</html>
