<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="base::head('Quản lý bác sĩ', null)"></head>
    <body>
        <div th:replace="base::siteHeader(${activePage})"></div>
        <main class="admin-page">
            <div class="container py-4">
                <div class="page-banner mb-4">
                    <h2 class="mb-1 fw-bold">Quản lý bác sĩ</h2>
                    <p class="ms-0 text-muted">Cập nhật thông tin chuyên khoa bác sĩ</p>
                </div>
                
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <form method="get" th:action="@{/admin/doctors}" class="row g-3">
                            <div class="col-md-6">
                                <input type="text" name="kw" class="form-control"
                                       placeholder="Tên bác sĩ hoặc chuyên khoa"
                                       th:value="${kw}"/>
                            </div>
                            <div class="col-md-6 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Tìm kiếm</button>
                                <a th:href="@{/admin/doctors}" class="btn btn-outline-secondary">Xóa lọc</a>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>#</th>
                                        <th>Tên bác sĩ</th>
                                        <th>Chuyên khoa</th>
                                        <th>Giới tính</th>
                                        <th>Ngày sinh</th>
                                        <th>Địa chỉ</th>
                                        <th>Phí khám</th>
                                        <th>Khám online</th>
                                        <th>Rating</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="d:${doctors}">
                                        <td th:text="${d.id}"></td>
                                        <td th:text="${d.userId.name}"></td>
                                        <td th:text="${d.specialtyId.name}"></td>
                                        <td th:text="${d.gender == 'MALE' ? 'Nam' : d.gender == 'FEMALE' ? 'Nữ' : '-'}"></td>
                                        <td th:text="${d.dateOfBirth != null ? #dates.format(d.dateOfBirth, 'dd/MM/yyyy') : '-'}"></td>
                                        <td th:text="${d.address != null ? d.address : '-'}"></td>
                                        <td th:text="${#numbers.formatDecimal(d.consultationFee, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                                        <td>
                                            <span th:if="${d.availableOnline}" class="badge bg-success">Online</span>
                                            <span th:unless="${d.availableOnline}" class="badge bg-secondary">Offline</span>
                                        </td>
                                        <td th:text="${d.rating != null ? d.rating : '-'}"></td>
                                        <td>
                                            <a th:href="@{/admin/doctors/{id}(id=${d.id})}"
                                               class="btn btn-sm btn-outline-primary">Sửa</a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(doctors)}">
                                        <td colspan="10" class="text-center text-muted py-4">Không có bác sĩ nào</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="mt-3 d-flex justify-content-center"
                             th:if="${totalPages > 1}">
                            <nav>
                                <ul class="pagination mb-0">
                                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}">
                                        <a class="page-link"
                                           th:classappend="${i == currentPage} ? ' active' : ''"
                                           th:href="@{/admin/doctors(page=${i}, kw=${kw})}"
                                           th:text="${i}">
                                        </a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <div th:replace="base :: Footer"></div>
        <div th:replace="base :: commonScripts"></div>
    </body>
</html>
