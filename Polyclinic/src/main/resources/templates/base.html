<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <head th:fragment="head(title, extraCss)">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${title != null ? title : 'Polyclinic'}">Polyclinic</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/base.css}">

    <th:block th:if="${extraCss != null}">
        <link rel="stylesheet" th:href="@{${extraCss}}">
    </th:block>
</head>

<body>

    <header th:fragment="siteHeader(activePage)">
        <nav class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" th:href="@{/admin}">
                    <i class="bi bi-hospital me-2"></i>Polyclinic
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav ms-auto align-items-lg-center">

                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <a class="nav-link"
                               th:classappend="${activePage == 'dashboard'} ? ' active' : ''"
                               th:href="@{/admin}">
                                Bảng điều khiển
                            </a>
                        </li>

                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <a class="nav-link"
                               th:classappend="${activePage == 'users'} ? ' active' : ''"
                               th:href="@{/admin/users}">
                                Người dùng
                            </a>
                        </li>

                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <a class="nav-link"
                               th:classappend="${activePage == 'specialties'} ? ' active' : ''"
                               th:href="@{/admin/specialties}">
                                Chuyên khoa
                            </a>
                        </li>

                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <a class="nav-link"
                               th:classappend="${activePage == 'stats'} ? ' active' : ''"
                               th:href="@{/admin/stats}">
                                Báo cáo
                            </a>
                        </li>

                        <li class="nav-item dropdown ms-lg-3" sec:authorize="isAuthenticated()">
                            <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle me-1"></i>
                                <span sec:authentication="name">Quản trị viên</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li>
                                    <form th:action="@{/logout}" method="post" class="m-0">
                                        <button type="submit" class="dropdown-item text-danger">
                                            <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                                        </button>
                                    </form>
                                </li>
                            </ul>
                        </li>

                        <li class="nav-item ms-lg-3" sec:authorize="!isAuthenticated()">
                            <a class="btn btn-light btn-sm px-3" th:href="@{/login}">
                                Đăng nhập
                            </a>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <footer th:fragment="Footer" class="app-footer text-center">
        <div class="container">
            © 2026 Polyclinic Management System
        </div>
    </footer>

<th:block th:fragment="commonScripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</body>
</html>
