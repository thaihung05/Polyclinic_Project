<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="base :: head('Quản lý chuyên khoa', null)"></head>

    <body>

        <div th:replace="base :: siteHeader(${activePage})"></div>

        <main class="admin-page">
            <div class="container py-4">
                <div class="page-banner mb-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <h2 class="mb-1 fw-bold">Quản lý chuyên khoa</h2>
                        <p class="mb-0 text-muted">Danh sách chuyên khoa trong hệ thống</p>
                    </div>

                    <a th:href="@{/admin/specialties/add}" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-2"></i>
                        Thêm chuyên khoa
                    </a>
                </div>

                <!-- Table card -->
                <div class="card border-0 shadow-sm">

                    <div class="card-header bg-white">
                        <h5 class="mb-0 fw-bold">
                            Danh sách chuyên khoa
                        </h5>
                    </div>

                    <div class="card-body">

                        <div class="table-responsive">

                            <table class="table table-bordered table-hover align-middle mb-0">

                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Tên chuyên khoa</th>
                                        <th>Mô tả</th>
                                        <th>Số bác sĩ</th>
                                        <th>Trạng thái</th>
                                        <th width="260">Thao tác</th>
                                    </tr>
                                </thead>

                                <tbody>

                                    <tr th:each="s : ${specialties}">

                                        <!-- ID -->
                                        <td th:text="${s.id}"></td>

                                        <!-- Name -->
                                        <td th:text="${s.name}"></td>

                                        <!-- Description -->
                                        <td>
                                            <span th:if="${s.description != null and !#strings.isEmpty(s.description)}"
                                                  th:text="${s.description}">
                                            </span>

                                            <span th:unless="${s.description != null and !#strings.isEmpty(s.description)}"
                                                  class="text-muted">
                                                Chưa có mô tả
                                            </span>
                                        </td>

                                        <!-- Number of doctors -->
                                        <td th:text="${s.doctorsCollection.size()}"></td>

                                        <!-- Status -->
                                        <td>
                                            <span th:if="${s.isActive}" class="badge bg-success">
                                                Hoạt động
                                            </span>

                                            <span th:unless="${s.isActive}" class="badge bg-secondary">
                                                Tạm ẩn
                                            </span>
                                        </td>

                                        <!-- Actions -->
                                        <td class="d-flex gap-2 flex-wrap">

                                            <!-- View doctors -->
                                            <a th:href="@{/admin/specialties/{id}/doctors(id=${s.id})}"
                                               class="btn btn-sm btn-info">
                                                <i class="bi bi-person-lines-fill me-1"></i>
                                                Bác sĩ
                                            </a>

                                            <!-- Edit -->
                                            <a th:href="@{/admin/specialties/{id}(id=${s.id})}"
                                               class="btn btn-sm btn-warning">
                                                <i class="bi bi-pencil-square me-1"></i>
                                                Sửa
                                            </a>

                                            <!-- Delete -->
                                            <a th:href="@{/admin/specialties/delete/{id}(id=${s.id})}"
                                               class="btn btn-sm btn-danger"
                                               onclick="return confirm('Xóa chuyên khoa này?')">
                                                <i class="bi bi-trash me-1"></i>
                                                Xóa
                                            </a>

                                        </td>

                                    </tr>

                                    <!-- Empty state -->
                                    <tr th:if="${#lists.isEmpty(specialties)}">
                                        <td colspan="6"
                                            class="text-center text-muted">
                                            Chưa có dữ liệu chuyên khoa.
                                        </td>
                                    </tr>

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </div>
        </main>

        <div th:replace="base :: Footer"></div>
        <div th:replace="base :: commonScripts"></div>

    </body>
</html>
