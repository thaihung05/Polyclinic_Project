<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="base :: head('Quản lý người dùng', null)"></head>

    <body>
        <div th:replace="base :: siteHeader(${activePage})"></div>
        <main class="admin-page">
            <div class="container py-4">
                <div class="page-banner mb-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <h2 class="mb-1 fw-bold">Quản lý người dùng</h2>
                        <p class="mb-0 text-muted">Danh sách tài khoản trong hệ thống</p>
                    </div>
                    <a th:href="@{/admin/users/add}" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-2"></i>Thêm người dùng
                    </a>
                </div>
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0 fw-bold">Danh sách người dùng</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Tài khoản</th>
                                        <th>Họ tên</th>
                                        <th>Vai trò</th>
                                        <th>SĐT</th>
                                        <th>Trạng thái</th>
                                        <th width="180">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="u : ${users}">
                                        <td th:text="${u.id}"></td>
                                        <td th:text="${u.username}"></td>
                                        <td th:text="${u.name}"></td>
                                        <td th:text="${u.role}"></td>
                                        <td th:text="${u.phone}"></td>
                                        <td>
                                            <span th:if="${u.isActive}" class="badge bg-success">Hoạt động</span>
                                            <span th:unless="${u.isActive}" class="badge bg-secondary">Khóa</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/admin/users/{id}(id=${u.id})}" class="btn btn-sm btn-warning">
                                                Sửa
                                            </a>
                                            <a th:href="@{/admin/users/delete/{id}(id=${u.id})}"
                                               class="btn btn-sm btn-danger"
                                               onclick="return confirm('Khóa người dùng này?')">
                                                Khóa
                                            </a>
                                        </td>
                                    </tr>

                                    <tr th:if="${#lists.isEmpty(users)}">
                                        <td colspan="7" class="text-center text-muted">Chưa có dữ liệu người dùng.</td>
                                    </tr>
                                </tbody>
                            </table>
                            <div class="mt-3 d-flex justify-content-center"
                                 th:if="${totalPages > 1}">
                                <nav>
                                    <ul class="pagination mb-0">
                                        <li class="page-item"
                                            th:each="i : ${#numbers.sequence(1, totalPages)}">
                                            <a class="page-link"
                                               th:classappend="${i == currentPage} ? ' active' : ''"
                                               th:href="@{/admin/users(page=${i})}"
                                               th:text="${i}">
                                            </a>
                                        </li>
                                    </ul>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <div th:replace="base :: Footer"></div>
        <div th:replace="base :: commonScripts"></div>
    </body>
</html>
